name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: ${{ contains(github.event.head_commit.message, 'deploy:frontend') || contains(github.event.head_commit.message, 'deploy:all') }}
    environment: Production

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FinanceManager/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Upload Dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "FinanceManager/frontend/dist/*"
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          target: "/home/ubuntu/frontend-build"

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            sudo mkdir -p /var/www/finance

            sudo rm -rf /var/www/finance/*
            sudo cp -r /home/ubuntu/frontend-build/FinanceManager/frontend/dist/* /var/www/finance/

            sudo nginx -t
            sudo systemctl reload nginx