#cloud-config
package_update: true
package_upgrade: true
packages:
  - nginx
  - nodejs
  - npm
  - certbot
  - python3-certbot-nginx
  - git
  - ufw
  - ca-certificates
  - curl
  - gnupg
  - apt-transport-https

runcmd:
  # Open ports (OCI iptables firewall)
  - iptables -I INPUT 6 -m state --state NEW -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT 6 -m state --state NEW -p tcp --dport 443 -j ACCEPT
  - netfilter-persistent save

  # --- Golang ---
  - curl -LO https://go.dev/dl/go1.22.3.linux-arm64.tar.gz
  - tar -C /usr/local -xzf go1.22.3.linux-arm64.tar.gz
  - rm go1.22.3.linux-arm64.tar.gz
  - echo 'export PATH=$PATH:/usr/local/go/bin' >> /etc/profile.d/golang.sh
  - echo 'export GOPATH=$HOME/go' >> /etc/profile.d/golang.sh
  - chmod +x /etc/profile.d/golang.sh

  # --- Docker ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # --- Nginx ---
  - systemctl enable nginx
  - systemctl start nginx